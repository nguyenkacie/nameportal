<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Pronunciation Portal</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased text-left">
    <div id="root"></div>

    <script type="text/babel">
        // --- YOUR FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyD7Kmzvk3dpyto1Tir_TpxxpxQ_hqpFcJ4",
            authDomain: "name-pronunciation-d0b73.firebaseapp.com",
            projectId: "name-pronunciation-d0b73",
            storageBucket: "name-pronunciation-d0b73.firebasestorage.app",
            messagingSenderId: "367995857408",
            appId: "1:367995857408:web:db55787649700ea21ec6e5"
        };

        const TEACHER_PASSWORD = "staff123";
        const RECORD_LIMIT_SECONDS = 5;

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "name-pronunciation-6-8";

        const { useState, useEffect, useRef } = React;

        const PlayIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const StopIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"></rect></svg>;
        const MicIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>;
        const LockIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const AlertIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
        const CopyIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;

        function App() {
            const [user, setUser] = useState(null);
            const [authError, setAuthError] = useState(null);
            const [blockedDomain, setBlockedDomain] = useState("");
            const [students, setStudents] = useState([]);
            const [view, setView] = useState('add'); 
            const [isAdmin, setIsAdmin] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [timeLeft, setTimeLeft] = useState(RECORD_LIMIT_SECONDS);
            const [audioBase64, setAudioBase64] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [status, setStatus] = useState(null);
            const [currentlyPlaying, setCurrentlyPlaying] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isEmbedded, setIsEmbedded] = useState(false);

            const mrRef = useRef(null);
            const streamRef = useRef(null);
            const countdownIntervalRef = useRef(null);
            const audioObj = useRef(new Audio());

            useEffect(() => {
                setIsEmbedded(window.self !== window.top);
                const initAuth = async () => {
                    try {
                        await auth.signInAnonymously();
                    } catch (e) {
                        if (e.code === 'auth/requests-from-referer-blocked' || e.message.includes('blocked')) {
                            const domainMatch = e.message.match(/https?:\/\/[^\s]+/);
                            const domain = domainMatch ? domainMatch[0].replace(').', '').replace(')', '') : window.location.origin;
                            setBlockedDomain(domain);
                            setAuthError("This domain is blocked by your Google Cloud API Key settings.");
                        } else {
                            setAuthError(e.message);
                        }
                    }
                };
                initAuth();
                return auth.onAuthStateChanged(u => setUser(u));
            }, []);

            useEffect(() => {
                if (!user || !isAdmin) return;
                const path = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students');
                return path.onSnapshot(snap => {
                    setStudents(snap.docs.map(d => ({id: d.id, ...d.data()})));
                    setLoading(false);
                }, err => {
                    setLoading(false);
                });
            }, [user, isAdmin]);

            const notify = (msg, type = 'success') => {
                setStatus({ msg, type });
                if (type === 'success') setTimeout(() => setStatus(null), 5000);
            };

            const handleAdminLogin = () => {
                const pass = prompt("Enter Staff Password:");
                if (pass === TEACHER_PASSWORD) {
                    setIsAdmin(true);
                    setView('list');
                } else if (pass !== null) notify("Incorrect Password", "error");
            };

            const stopRec = () => {
                if (mrRef.current && mrRef.current.state !== "inactive") { mrRef.current.stop(); }
                if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); }
                if (countdownIntervalRef.current) { clearInterval(countdownIntervalRef.current); }
                setIsRecording(false);
            };

            const startRec = async () => {
                setAudioBase64(null); 
                setTimeLeft(RECORD_LIMIT_SECONDS);
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    streamRef.current = stream;
                    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
                    const mr = new MediaRecorder(stream, { mimeType });
                    mrRef.current = mr;
                    const chunks = [];
                    mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                    mr.onstop = () => {
                        const blob = new Blob(chunks, { type: mimeType });
                        const reader = new FileReader();
                        reader.readAsDataURL(blob);
                        reader.onloadend = () => setAudioBase64(reader.result);
                    };
                    mr.start();
                    setIsRecording(true);

                    // Start the 5-second countdown
                    countdownIntervalRef.current = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                stopRec();
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);

                } catch (e) { 
                    notify("Microphone blocked. Use the 'Fix Microphone' button below.", "error"); 
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!audioBase64) return notify("Please record audio first", "error");
                const fd = new FormData(e.target);
                const name = `${fd.get('fn')} ${fd.get('ln')}`.trim();
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').add({
                        name, grade: fd.get('gr'), homeroom: fd.get('hr'), audio: audioBase64, createdAt: Date.now()
                    });
                    setAudioBase64(null);
                    e.target.reset();
                    notify(`Saved recording for ${name}!`);
                } catch (e) { notify("Error saving", "error"); }
            };

            const play = (id, url) => {
                if (currentlyPlaying === id) { audioObj.current.pause(); setCurrentlyPlaying(null); return; }
                setCurrentlyPlaying(id);
                audioObj.current.src = url;
                audioObj.current.play().catch(() => setCurrentlyPlaying(null));
                audioObj.current.onended = () => setCurrentlyPlaying(null);
            };

            const copyToClipboard = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                notify("Domain copied!");
            };

            if (authError) return (
                <div className="flex flex-col items-center justify-center min-h-screen p-8 text-center bg-slate-100">
                    <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-xl border border-slate-100">
                        <AlertIcon />
                        <h2 className="text-xl font-black mt-4">Connection Error</h2>
                        <p className="text-sm text-slate-500 my-4">{authError}</p>
                        {blockedDomain && (
                            <div className="bg-slate-50 p-4 rounded-xl text-left mb-6">
                                <button onClick={() => copyToClipboard(blockedDomain)} className="text-[10px] font-black text-indigo-600 uppercase mb-2 block">Copy Required Domain</button>
                                <code className="text-[10px] break-all">{blockedDomain}</code>
                            </div>
                        )}
                        <p className="text-xs text-slate-400">Add this domain to your Google Cloud API Key restrictions.</p>
                    </div>
                </div>
            );

            if (!user) return <div className="p-20 text-center font-bold text-slate-300 animate-pulse">CONNECTING...</div>;

            return (
                <div className="max-w-4xl mx-auto py-8 px-4">
                    <header className="bg-white rounded-[2rem] p-6 mb-8 shadow-sm flex justify-between items-center border border-slate-100">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2.5 rounded-2xl shadow-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                            </div>
                            <div className="text-left">
                                <h1 className="text-xl font-black text-slate-800 leading-tight">Name Portal</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Student Center</p>
                            </div>
                        </div>
                        <button onClick={handleAdminLogin} className="px-4 py-2.5 rounded-xl text-[10px] font-black bg-slate-100 text-slate-500 flex items-center gap-2 uppercase tracking-widest">
                            <LockIcon /> {isAdmin ? "STAFF LOGGED IN" : "STAFF"}
                        </button>
                    </header>

                    {isAdmin && view === 'list' ? (
                        <div className="space-y-6">
                            <div className="flex justify-between items-center px-2">
                                <h2 className="text-2xl font-black text-slate-800">Directory</h2>
                                <button onClick={() => setView('add')} className="text-xs font-bold text-indigo-600 hover:underline">Recorder</button>
                            </div>
                            <input placeholder="Search..." className="w-full p-5 rounded-2xl bg-white border border-slate-100 font-bold text-lg outline-none" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            <div className="grid gap-4">
                                {students.filter(s => (s.name || "").toLowerCase().includes(searchTerm.toLowerCase())).map(s => (
                                    <div key={s.id} className="bg-white p-6 rounded-[1.75rem] shadow-sm flex items-center justify-between border border-slate-50 text-left">
                                        <div className="flex items-center gap-5">
                                            <div className={`w-14 h-14 rounded-2xl flex items-center justify-center font-black text-xl ${currentlyPlaying === s.id ? 'bg-rose-500 text-white' : 'bg-indigo-50 text-indigo-600'}`}>{currentlyPlaying === s.id ? '🔊' : (s.name || "?").charAt(0)}</div>
                                            <div><h3 className="font-black text-slate-800 text-lg">{s.name}</h3><p className="text-[10px] font-bold text-slate-400 uppercase">{s.grade}TH • {s.homeroom}</p></div>
                                        </div>
                                        <button onClick={() => play(s.id, s.audio)} className={`px-6 py-3.5 rounded-2xl font-black text-xs ${currentlyPlaying === s.id ? 'bg-rose-600 text-white' : 'bg-slate-900 text-white'}`}>{currentlyPlaying === s.id ? 'STOP' : 'PLAY'}</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-xl border border-slate-50">
                            <div className="flex justify-between items-center mb-8">
                                <h2 className="text-3xl font-black text-slate-900">Record Your Name</h2>
                                {isEmbedded && (
                                    <button onClick={() => window.open(window.location.href, '_blank')} className="bg-amber-100 text-amber-700 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">⚠️ Fix Microphone</button>
                                )}
                            </div>
                            
                            {status && (
                                <div className={`mb-8 p-5 rounded-2xl font-bold text-sm border ${status.type==='success'?'bg-emerald-50 text-emerald-700 border-emerald-100':'bg-rose-50 text-rose-700 border-rose-100'}`}>
                                    {status.msg}
                                </div>
                            )}

                            <form onSubmit={handleSubmit} className="space-y-8 text-left">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div><label className="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-2">First Name</label><input required name="fn" className="w-full p-5 rounded-2xl bg-slate-50 border-none outline-none font-bold" /></div>
                                    <div><label className="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-2">Last Name</label><input required name="ln" className="w-full p-5 rounded-2xl bg-slate-50 border-none outline-none font-bold" /></div>
                                    <div><label className="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-2">Grade</label><select name="gr" className="w-full p-5 rounded-2xl bg-slate-50 font-bold border-none outline-none"><option value="6">6th Grade</option><option value="7">7th Grade</option><option value="8">8th Grade</option></select></div>
                                    <div><label className="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-2">Homeroom Teacher</label><input required name="hr" className="w-full p-5 rounded-2xl bg-slate-50 border-none outline-none font-bold" /></div>
                                </div>
                                <div className="bg-indigo-50/50 p-12 rounded-[2rem] flex flex-col items-center border-2 border-dashed border-indigo-100 relative">
                                    {!isRecording ? (
                                        <button type="button" onClick={startRec} className="w-24 h-24 bg-rose-500 text-white rounded-[2rem] flex items-center justify-center shadow-xl hover:scale-105 transition-all"><MicIcon /></button>
                                    ) : (
                                        <button type="button" onClick={stopRec} className="w-24 h-24 bg-slate-900 text-white rounded-[2rem] flex items-center justify-center animate-pulse"><StopIcon /></button>
                                    )}
                                    <div className="mt-6 text-xs font-black text-slate-400 uppercase tracking-widest text-center">
                                        {isRecording ? `Stopping in ${timeLeft}s...` : audioBase64 ? "Recording Saved (5s Max)" : "Tap Microphone (5s Limit)"}
                                    </div>
                                    {audioBase64 && <button type="button" onClick={() => new Audio(audioBase64).play()} className="mt-4 text-indigo-600 font-bold text-xs uppercase underline tracking-widest">Preview Recording</button>}
                                </div>
                                <button type="submit" className="w-full py-6 bg-indigo-600 text-white font-black text-xl rounded-[1.5rem] shadow-xl disabled:bg-slate-200" disabled={!audioBase64}>SAVE RECORDING</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

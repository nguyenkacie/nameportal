<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Pronunciation Portal</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for In-Browser Execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDKs (Compatibility Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        // --- YOUR FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyD7Kmzvk3dpyto1Tir_TpxxpxQ_hqpFcJ4",
            authDomain: "name-pronunciation-d0b73.firebaseapp.com",
            projectId: "name-pronunciation-d0b73",
            storageBucket: "name-pronunciation-d0b73.firebasestorage.app",
            messagingSenderId: "367995857408",
            appId: "1:367995857408:web:db55787649700ea21ec6e5"
        };

        // --- ADMIN PASSWORD ---
        const TEACHER_PASSWORD = "staff123";

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "name-pronunciation-6-8";

        const { useState, useEffect, useRef } = React;

        // --- UI Icons ---
        const PlayIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const StopIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"></rect></svg>;
        const MicIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>;
        const LockIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const AlertIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;

        function App() {
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [view, setView] = useState('add'); 
            const [isAdmin, setIsAdmin] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [audioBase64, setAudioBase64] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [status, setStatus] = useState(null);
            const [currentlyPlaying, setCurrentlyPlaying] = useState(null);
            const [loading, setLoading] = useState(true);

            const mrRef = useRef(null);
            const streamRef = useRef(null);
            const audioObj = useRef(new Audio());

            useEffect(() => {
                auth.signInAnonymously().catch(console.error);
                return auth.onAuthStateChanged(u => setUser(u));
            }, []);

            useEffect(() => {
                if (!user || !isAdmin) return;
                const path = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students');
                return path.onSnapshot(snap => {
                    setStudents(snap.docs.map(d => ({id: d.id, ...d.data()})));
                    setLoading(false);
                }, err => setLoading(false));
            }, [user, isAdmin]);

            const notify = (msg, type = 'success') => {
                setStatus({ msg, type });
                if (type === 'success') {
                    setTimeout(() => setStatus(null), 6000);
                }
            };

            const handleAdminLogin = () => {
                const pass = prompt("Enter Teacher Password:");
                if (pass === TEACHER_PASSWORD) {
                    setIsAdmin(true);
                    setView('list');
                    notify("Staff Access Granted");
                } else if (pass !== null) {
                    notify("Incorrect Password", "error");
                }
            };

            const startRec = async () => {
                setAudioBase64(null); 
                setStatus(null);
                try {
                    if (!window.isSecureContext) {
                        throw new Error("HTTPS Required: Microphone access is blocked on non-secure sites.");
                    }

                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    streamRef.current = stream;

                    const mimeType = MediaRecorder.isTypeSupported('audio/webm') 
                        ? 'audio/webm' 
                        : 'audio/mp4';

                    const mr = new MediaRecorder(stream, { mimeType });
                    mrRef.current = mr;
                    const chunks = [];
                    
                    mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                    mr.onstop = () => {
                        const blob = new Blob(chunks, { type: mimeType });
                        const reader = new FileReader();
                        reader.readAsDataURL(blob);
                        reader.onloadend = () => setAudioBase64(reader.result);
                    };

                    mr.start();
                    setIsRecording(true);
                } catch (e) { 
                    console.error(e);
                    let errorMsg = "Permission Error: Google Sites is blocking the microphone in this embed. ";
                    if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
                        errorMsg += "Even though you clicked 'Allow' in the browser, the 'Embed Code' box is restricted. Please try hosting the file on Firebase and using 'Embed URL' instead.";
                    } else {
                        errorMsg = e.message;
                    }
                    notify(errorMsg, "error"); 
                }
            };

            const stopRec = () => {
                if (mrRef.current && mrRef.current.state !== "inactive") { mrRef.current.stop(); }
                if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); }
                setIsRecording(false);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!audioBase64) return notify("Please record audio first", "error");
                const fd = new FormData(e.target);
                const name = `${fd.get('fn')} ${fd.get('ln')}`.trim();
                
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').add({
                        name: name,
                        grade: fd.get('gr'),
                        homeroom: fd.get('hr'),
                        audio: audioBase64,
                        createdAt: Date.now()
                    });
                    setAudioBase64(null);
                    e.target.reset();
                    notify(`Saved recording for ${name}!`, 'success');
                } catch (e) { notify("Error saving to database", "error"); }
            };

            const play = (id, url) => {
                if (currentlyPlaying === id) {
                    audioObj.current.pause();
                    setCurrentlyPlaying(null);
                    return;
                }
                setCurrentlyPlaying(id);
                audioObj.current.src = url;
                audioObj.current.play().catch(() => {
                    setCurrentlyPlaying(null);
                    notify("Playback failed", "error");
                });
                audioObj.current.onended = () => setCurrentlyPlaying(null);
            };

            if (!user) return <div className="p-20 text-center font-bold text-slate-300 animate-pulse">Initialising...</div>;

            return (
                <div className="max-w-4xl mx-auto py-8 px-4">
                    <header className="bg-white rounded-[2rem] p-6 mb-8 shadow-sm flex justify-between items-center border border-slate-100">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2.5 rounded-2xl shadow-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-slate-800 leading-tight">Name Portal</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-left">Student Center</p>
                            </div>
                        </div>
                        <div>
                            {isAdmin ? (
                                <div className="flex gap-2">
                                    <button onClick={() => setView('add')} className={`px-4 py-2.5 rounded-xl text-xs font-black transition-all ${view==='add'?'bg-indigo-600 text-white shadow-lg':'bg-slate-50 text-slate-500'}`}>RECORDER</button>
                                    <button onClick={() => setView('list')} className={`px-4 py-2.5 rounded-xl text-xs font-black transition-all ${view==='list'?'bg-indigo-600 text-white shadow-lg':'bg-slate-50 text-slate-500'}`}>DIRECTORY</button>
                                </div>
                            ) : (
                                <button onClick={handleAdminLogin} className="px-4 py-2.5 rounded-xl text-[10px] font-black bg-slate-100 text-slate-500 flex items-center gap-2 hover:bg-slate-200 transition-all uppercase">
                                    <LockIcon /> Staff
                                </button>
                            )}
                        </div>
                    </header>

                    {status && (
                        <div className={`mb-6 p-5 rounded-2xl font-bold text-sm border flex items-start gap-4 animate-in slide-in-from-top-4 duration-300 ${status.type==='success'?'bg-emerald-50 text-emerald-700 border-emerald-100':'bg-rose-50 text-rose-700 border-rose-100'}`}>
                            <div className="mt-1">{status.type === 'success' ? '✓' : <AlertIcon />}</div>
                            <div className="flex-1 text-left">
                                <p className="leading-relaxed">{status.msg}</p>
                                {status.type === 'error' && <button onClick={() => setStatus(null)} className="mt-2 text-[10px] uppercase underline opacity-70">Dismiss</button>}
                            </div>
                        </div>
                    )}

                    {view === 'add' ? (
                        <div className="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-xl border border-slate-50">
                            <h2 className="text-3xl font-black text-slate-900 mb-8 text-left">Record Your Name</h2>
                            <form onSubmit={handleSubmit} className="space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                                    <div><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-2">First Name</label><input required name="fn" className="w-full p-5 rounded-2xl bg-slate-50 border-none outline-none focus:ring-4 focus:ring-indigo-500/10 text-lg font-bold" /></div>
                                    <div><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-2">Last Name</label><input required name="ln" className="w-full p-5 rounded-2xl bg-slate-50 border-none outline-none focus:ring-4 focus:ring-indigo-500/10 text-lg font-bold" /></div>
                                    <div><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-2">Grade</label><select name="gr" className="w-full p-5 rounded-2xl bg-slate-50 font-bold border-none outline-none focus:ring-4 focus:ring-indigo-500/10"><option value="6">6th Grade</option><option value="7">7th Grade</option><option value="8">8th Grade</option></select></div>
                                    <div><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-2">Homeroom Teacher</label><input required name="hr" className="w-full p-5 rounded-2xl bg-slate-50 border-none outline-none focus:ring-4 focus:ring-indigo-500/10 text-lg font-bold" /></div>
                                </div>
                                <div className="bg-indigo-50/50 p-12 rounded-[2rem] flex flex-col items-center border-2 border-dashed border-indigo-100 relative overflow-hidden">
                                    {!isRecording ? (
                                        <button type="button" onClick={startRec} className="w-24 h-24 bg-rose-500 text-white rounded-[2rem] flex items-center justify-center shadow-xl hover:scale-105 transition-all active:scale-95 z-10"><MicIcon /></button>
                                    ) : (
                                        <button type="button" onClick={stopRec} className="w-24 h-24 bg-slate-900 text-white rounded-[2rem] flex items-center justify-center animate-pulse shadow-xl z-10"><StopIcon /></button>
                                    )}
                                    <div className="mt-6 text-xs font-black text-slate-400 uppercase tracking-widest text-center z-10">
                                        {isRecording ? "Recording... Tap to Stop" : audioBase64 ? "Captured & Ready" : "Tap Microphone to Start"}
                                    </div>
                                    {audioBase64 && <button type="button" onClick={() => new Audio(audioBase64).play()} className="mt-4 text-indigo-600 font-black text-xs hover:underline uppercase flex items-center gap-1"><PlayIcon /> Play Preview</button>}
                                    {isRecording && <div className="absolute inset-0 bg-rose-50/30 animate-pulse pointer-events-none"></div>}
                                </div>
                                <button type="submit" className="w-full py-6 bg-indigo-600 text-white font-black text-xl rounded-[1.5rem] shadow-xl hover:bg-indigo-700 transition-colors disabled:bg-slate-200" disabled={!audioBase64}>SAVE RECORDING</button>
                            </form>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            <input placeholder="Search directory..." className="w-full p-5 rounded-2xl bg-white shadow-sm border border-slate-100 font-bold text-lg outline-none focus:ring-4 focus:ring-indigo-500/10" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            <div className="grid gap-4">
                                {loading ? <div className="p-20 text-center font-bold text-slate-200 uppercase tracking-widest text-xs">Loading Directory...</div> :
                                students.filter(s => (s.name || "").toLowerCase().includes(searchTerm.toLowerCase())).map(s => (
                                    <div key={s.id} className="bg-white p-6 rounded-[1.75rem] shadow-sm flex items-center justify-between border border-slate-50 group transition-all text-left">
                                        <div className="flex items-center gap-5">
                                            <div className={`w-14 h-14 rounded-2xl flex items-center justify-center font-black text-xl transition-all duration-300 ${currentlyPlaying === s.id ? 'bg-rose-500 text-white animate-pulse' : 'bg-indigo-50 text-indigo-600'}`}>
                                                {currentlyPlaying === s.id ? '🔊' : (s.name || "?").charAt(0)}
                                            </div>
                                            <div>
                                                <h3 className="font-black text-slate-800 text-lg tracking-tight">{s.name}</h3>
                                                <div className="flex items-center gap-2 mt-1">
                                                    <span className="text-[9px] font-black bg-indigo-600 text-white px-2 py-0.5 rounded tracking-widest">{s.grade}TH</span>
                                                    <span className="text-[10px] font-bold text-slate-400 uppercase truncate max-w-[150px]">{s.homeroom}</span>
                                                </div>
                                            </div>
                                        </div>
                                        <button onClick={() => play(s.id, s.audio)} className={`px-6 py-3.5 rounded-2xl font-black text-xs transition-all flex items-center gap-2 shadow-lg ${currentlyPlaying === s.id ? 'bg-rose-600 text-white' : 'bg-slate-900 text-white hover:bg-indigo-600'}`}>
                                            {currentlyPlaying === s.id ? <StopIcon /> : <PlayIcon />}
                                            {currentlyPlaying === s.id ? 'STOP' : 'PLAY'}
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
